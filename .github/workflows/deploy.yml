name: Deploy to EC2

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/**'
      - 'docker/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: peek-a-chu/peekle

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai_server: ${{ steps.filter.outputs.ai_server }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            ai_server:
              - 'apps/ai-server/**'
            docker:
              - 'docker/**'

  build-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:buildcache,mode=max

  build-ai-server:
    needs: [changes]
    if: needs.changes.outputs.ai_server == 'true' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for AI Server
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai-server

      - name: Build and push AI Server image
        uses: docker/build-push-action@v5
        with:
          context: apps/ai-server
          file: apps/ai-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai-server:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ai-server:buildcache,mode=max

  deploy:
    needs: [changes, build-backend, build-ai-server]
    if: |
      always() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ai_server == 'true' || needs.changes.outputs.docker == 'true') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-ai-server.result == 'success' || needs.build-ai-server.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Go to project directory (Assuming repository is cloned in ~/peekle)
            if [ ! -d ~/peekle ]; then
              git clone https://github.com/${{ github.repository }}.git ~/peekle
            fi
            
            cd ~/peekle
            
            # Pull latest changes for docker-compose.prod.yml
            git pull origin main || git pull origin master
            cd docker
            
            # 3. Export environment variables used in docker-compose
            export CI_REGISTRY_IMAGE=ghcr.io/peek-a-chu/peekle
            # For simplicity, we just use 'main' or 'master' tag. In a real scenario, you can pass SHA.
            export CI_COMMIT_SHORT_SHA=main
            
            # (Create dummy .env if doesn't exist to avoid compose errors)
            if [ ! -f .env ]; then
              touch .env
            fi
            # AI 서버 전용 env 파일
            if [ ! -f ../apps/ai-server/.env ]; then
              touch ../apps/ai-server/.env
            fi
            
            # 파일별 env를 통일 관리
            upsert_env_file() {
              FILE="$1"
              KEY="$2"
              VALUE="$3"
              if [ -z "$VALUE" ]; then
                return 0
              fi
              ESCAPED_VALUE=$(printf '%s\n' "$VALUE" | sed -e 's/[\/&]/\\&/g')
              if grep -q "^${KEY}=" "$FILE"; then
                sed -i "s|^${KEY}=.*|${KEY}=${ESCAPED_VALUE}|" "$FILE"
              else
                echo "${KEY}=${VALUE}" >> "$FILE"
              fi
            }

            upsert_env() {
              KEY="$1"
              VALUE="$2"
              upsert_env_file .env "$KEY" "$VALUE"
            }

            upsert_env DOMAIN_NAME "${{ secrets.DOMAIN_NAME }}"
            upsert_env POSTGRES_DB "${{ secrets.POSTGRES_DB }}"
            upsert_env POSTGRES_USER "${{ secrets.POSTGRES_USER }}"
            upsert_env POSTGRES_PASSWORD "${{ secrets.POSTGRES_PASSWORD }}"
            upsert_env_file ../apps/ai-server/.env GEMINI_API_KEY "${{ secrets.GEMINI_API_KEY }}"
            upsert_env_file ../apps/ai-server/.env GEMINI_BASE_URL "${{ secrets.GEMINI_BASE_URL }}"
            upsert_env_file ../apps/ai-server/.env GEMINI_CHAT_MODEL "${{ secrets.GEMINI_CHAT_MODEL }}"
            upsert_env_file ../apps/ai-server/.env EMBEDDING_MODEL "${{ secrets.EMBEDDING_MODEL }}"

            BACKEND_CHANGED=${{ needs.changes.outputs.backend }}
            AI_CHANGED=${{ needs.changes.outputs.ai_server }}
            DOCKER_CHANGED=${{ needs.changes.outputs.docker }}

            # 4. Pull images only when needed
            if [ "$BACKEND_CHANGED" = "true" ] || [ "$DOCKER_CHANGED" = "true" ]; then
              docker compose -f docker-compose.prod.yml pull backend
            fi
            if [ "$AI_CHANGED" = "true" ] || [ "$DOCKER_CHANGED" = "true" ]; then
              docker compose -f docker-compose.prod.yml pull ai-server
            fi

            # 5. Deploy strategy
            if [ "$DOCKER_CHANGED" = "true" ]; then
              # docker/** changed => full infra redeploy
              docker compose -f docker-compose.prod.yml up -d --remove-orphans backend ai-server redis postgres-vector livekit certbot
              docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate nginx
              docker exec peekle-nginx nginx -t
              docker exec peekle-nginx nginx -s reload
            else
              # App-only changes => only changed services
              if [ "$BACKEND_CHANGED" = "true" ]; then
                docker compose -f docker-compose.prod.yml up -d --remove-orphans backend
              fi
              if [ "$AI_CHANGED" = "true" ]; then
                docker compose -f docker-compose.prod.yml up -d --remove-orphans ai-server
              fi
            fi

            # 6. Clean up unused loose images
            docker image prune -f
