services:
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: peekle-backend-benchmark
    environment:
      SPRING_PROFILES_ACTIVE: benchmark
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/peekle_benchmark?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: peekle
      DB_PASSWORD: peekle
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: peekle-redis-password
      BENCHMARK_REDIS_FLUSH_ON_STARTUP: "true"
      BENCHMARK_GAME_FINISH_CLAIM_ENABLED: ${BENCHMARK_GAME_FINISH_CLAIM_ENABLED:-true}
      BENCHMARK_PROBLEMS_CSV_PATH: file:/app/data/problems.csv
      FRONTEND_URL: http://localhost:3000
      JAVA_OPTS: -Xms1g -Xmx1g -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/ai-server/problems.csv:/app/data/problems.csv:ro
    networks:
      - peekle-benchmark

  mysql:
    image: mysql:8.4
    container_name: peekle-mysql-benchmark
    environment:
      MYSQL_DATABASE: peekle_benchmark
      MYSQL_USER: peekle
      MYSQL_PASSWORD: peekle
      MYSQL_ROOT_PASSWORD: root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-benchmark-data:/var/lib/mysql
    networks:
      - peekle-benchmark

  redis:
    image: redis:7-alpine
    container_name: peekle-redis-benchmark
    command: redis-server --appendonly yes --requirepass peekle-redis-password
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "peekle-redis-password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-benchmark-data:/data
    networks:
      - peekle-benchmark

networks:
  peekle-benchmark:
    driver: bridge

volumes:
  mysql-benchmark-data:
    driver: local
  redis-benchmark-data:
    driver: local
