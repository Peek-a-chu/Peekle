services:
  redis:
    image: redis:7-alpine
    container_name: peekle-redis
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: peekle-postgres-vector
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-peekle}
      POSTGRES_USER: ${POSTGRES_USER:-peekle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peekle-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-vector-data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peekle} -d ${POSTGRES_DB:-peekle}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-server:
    build:
      context: ../apps/ai-server
      dockerfile: Dockerfile
    container_name: peekle-ai-server
    env_file:
      - ../apps/ai-server/.env
    environment:
      - PGVECTOR_HOST=postgres-vector
      - PGVECTOR_PORT=5432
      - PGVECTOR_DB=${POSTGRES_DB:-peekle}
      - PGVECTOR_USER=${POSTGRES_USER:-peekle}
      - PGVECTOR_PASSWORD=${POSTGRES_PASSWORD:-peekle-password}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres-vector:
        condition: service_healthy
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: peekle-livekit-local
    command: --dev --bind 0.0.0.0
    env_file: .env
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: peekle-redis-commander
    env_file: .env
    environment:
      - REDIS_HOSTS=peekle-redis:redis:6379:0:${REDIS_PASSWORD}
      - REDIS_HOST=redis
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  postgres-vector-data:
    driver: local
