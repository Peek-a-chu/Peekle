spring:
  config:
    activate:
      on-profile: benchmark

  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/peekle_benchmark?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:peekle}
    password: ${DB_PASSWORD:peekle}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        generate_statistics: true
        format_sql: false
        show_sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: benchmark-kakao-client-id
            client-secret: benchmark-kakao-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
            client-name: Kakao
          naver:
            client-id: benchmark-naver-client-id
            client-secret: benchmark-naver-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: name, profile_image
            client-name: Naver
          google:
            client-id: benchmark-google-client-id
            client-secret: benchmark-google-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile, email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: dGVzdGp3dHNlY3JldGtleWZvcnRlc3RpbmdwdXJwb3Nlc21pbmltdW0yNTZiaXRzcmVxdWlyZWQ=
  access-token-expiry: 1800000
  refresh-token-expiry: 1209600000

app:
  frontend-url: http://localhost:3000

r2:
  account-id: benchmark-account
  access-key-id: benchmark-access-key
  secret-access-key: benchmark-secret-key
  bucket-name: benchmark-bucket
  public-url: http://localhost:9000/benchmark

livekit:
  url: ${LIVEKIT_URL:http://localhost:7880}
  api-key: ${LIVEKIT_API_KEY:devkey}
  api-secret: ${LIVEKIT_API_SECRET:benchmark_livekit_secret_at_least_32_chars_long}

benchmark:
  problem-catalog:
    path: ${BENCHMARK_PROBLEMS_CSV_PATH:file:../ai-server/problems.csv}

springwolf:
  enabled: false

logging:
  level:
    org.hibernate.stat: INFO
